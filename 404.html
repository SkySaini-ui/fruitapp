<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FreshMart</title>
  <script>
    // GitHub Pages 404 fix - redirect to index
    sessionStorage.redirect = location.href;
    location.replace(location.origin + location.pathname.split('/').slice(0, 2).join('/') + '/?p=' + location.pathname.slice(1).replace(/&/g, '~and~') + (location.search ? '&q=' + location.search.slice(1).replace(/&/g, '~and~') : '') + location.hash);
  </script>
</head>
<body>Redirecting to FreshMart...</body>
</html>
